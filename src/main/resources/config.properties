# Oracle Database Comparison Tool Configuration
# =============================================
# This tool runs MINUS queries to compare ALS_LEGACY_REPLICA (Golden Gate) 
# tables against local schema tables on the same database.

# Database Connection
jdbc.url=jdbc:oracle:thin:@//your-host:1521/your_service
jdbc.user=your_username
jdbc.password=your_password

# Output Configuration
output.directory=./reports
output.filename.prefix=legacy_comparison_report

# Email Configuration (Optional)
email.enabled=false
email.smtp.host=smtp.example.com
email.smtp.port=587
email.smtp.auth=true
email.smtp.starttls=true
email.from=sender@example.com
email.to=recipient@example.com
email.cc=
email.subject=Legacy vs Modern Exadata Comparison Report
email.username=your_email_username
email.password=your_email_password
